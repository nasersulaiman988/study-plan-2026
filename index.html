<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معسكر الـ 12 ساعة | صُنّاع التفوّق</title>
    <!-- المكتبات الخارجية -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('daily');
            const [subjects, setSubjects] = useState(() => {
                const saved = localStorage.getItem('study_subjects');
                return saved ? JSON.parse(saved) : [
                    { name: 'العلوم', pages: 270, color: 'bg-emerald-500' },
                    { name: 'الفيزياء', pages: 270, color: 'bg-blue-500' },
                    { name: 'الرياضيات', pages: 400, color: 'bg-indigo-500' },
                    { name: 'الكيمياء', pages: 190, color: 'bg-amber-500' },
                    { name: 'الإنجليزية', pages: 200, color: 'bg-rose-500' },
                    { name: 'الفرنسية', pages: 120, color: 'bg-purple-500' },
                    { name: 'الإسلامية', pages: 100, color: 'bg-teal-600' }
                ];
            });

            const [progress, setProgress] = useState(() => {
                const saved = localStorage.getItem('study_progress');
                return saved ? JSON.parse(saved) : {};
            });

            const [inputVal, setInputVal] = useState({});
            const [totalInput, setTotalInput] = useState({});

            useEffect(() => {
                localStorage.setItem('study_subjects', JSON.stringify(subjects));
                localStorage.setItem('study_progress', JSON.stringify(progress));
            }, [subjects, progress]);

            const updateProgress = (name, val, isAdd) => {
                const num = parseInt(val) || 0;
                const current = progress[name] || 0;
                const sub = subjects.find(s => s.name === name);
                let next = isAdd ? current + num : current - num;
                next = Math.max(0, Math.min(next, sub.pages));
                setProgress({...progress, [name]: next});
                setInputVal({...inputVal, [name]: ''});
            };

            const updateTotal = (name) => {
                const num = parseInt(totalInput[name]) || 0;
                if (num > 0) {
                    setSubjects(subjects.map(s => s.name === name ? {...s, pages: num} : s));
                    setTotalInput({...totalInput, [name]: ''});
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24">
                    {/* Header */}
                    <header className="bg-white p-6 rounded-b-[2.5rem] shadow-sm mb-4 border-b border-slate-200">
                        <div className="flex justify-between items-center mb-2">
                            <span className="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-1 rounded-full font-bold">يعمل بدون إنترنت ✅</span>
                            <span className="text-slate-400 text-[10px]">v2.0</span>
                        </div>
                        <h1 className="text-2xl font-black text-slate-800">صُنّاع التفوّق 🚀</h1>
                        <p className="text-slate-500 text-xs mt-1">"الالتزام هو الفارق بينك وبين هدفك"</p>
                    </header>

                    {/* Tabs */}
                    <div className="flex px-4 gap-2 mb-4">
                        {['daily', 'weekly', 'stats'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 rounded-2xl text-xs font-bold transition-all ${activeTab === t ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-500'}`}>
                                {t === 'daily' ? 'اليومي' : t === 'weekly' ? 'الجدول' : 'الإنجاز'}
                            </button>
                        ))}
                    </div>

                    <div className="px-4">
                        {activeTab === 'daily' && (
                            <div className="space-y-4">
                                <div className="bg-white p-5 rounded-3xl border border-slate-200">
                                    <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2">⏱️ فترات المعسكر</h3>
                                    {[
                                        {t: "05:00", m: "علوم", c: "bg-emerald-500"},
                                        {t: "10:00", m: "رياضيات/فيزياء", c: "bg-blue-500"},
                                        {t: "15:30", m: "كيمياء/علوم", c: "bg-amber-500"},
                                        {t: "18:30", m: "لغات/إسلامية", c: "bg-rose-500"}
                                    ].map((item, i) => (
                                        <div key={i} className="flex items-center gap-3 mb-3 last:mb-0 bg-slate-50 p-3 rounded-xl">
                                            <span className="text-[10px] font-bold text-slate-400 w-10">{item.t}</span>
                                            <div className={`w-1 h-6 rounded-full ${item.c}`}></div>
                                            <span className="text-sm font-bold text-slate-700">{item.m}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-indigo-900 text-white p-5 rounded-3xl shadow-lg">
                                    <h4 className="font-bold text-sm mb-2">💡 استراتيجية التفوّق</h4>
                                    <p className="text-[10px] opacity-80 leading-relaxed">استخدم <b>NotebookLM</b> لإنشاء اختبارات ذاتية وبطاقات مراجعة من ملفاتك الدراسية خلال فترات المراجعة.</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="space-y-4">
                                {subjects.map((sub, i) => {
                                    const cur = progress[sub.name] || 0;
                                    const prc = Math.round((cur / sub.pages) * 100);
                                    return (
                                        <div key={i} className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
                                            <div className="flex justify-between items-center mb-2">
                                                <h4 className="font-bold text-slate-800">{sub.name}</h4>
                                                <span className="text-lg font-black text-indigo-600">{prc}%</span>
                                            </div>
                                            <div className="w-full bg-slate-100 h-2 rounded-full mb-4 overflow-hidden">
                                                <div className={`h-full ${sub.color} transition-all duration-500`} style={{width: `${prc}%`}}></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-2">
                                                    <input type="number" value={inputVal[sub.name] || ''} onChange={e => setInputVal({...inputVal, [sub.name]: e.target.value})} placeholder="أضف صفحات.." className="w-full p-2 bg-slate-50 rounded-xl text-[10px] border focus:outline-none"/>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => updateProgress(sub.name, inputVal[sub.name], true)} className={`flex-1 py-2 text-white rounded-xl ${sub.color} text-[10px] font-bold`}>+</button>
                                                        <button onClick={() => updateProgress(sub.name, inputVal[sub.name], false)} className="flex-1 py-2 bg-slate-100 text-slate-400 rounded-xl text-[10px] font-bold">-</button>
                                                    </div>
                                                </div>
                                                <div className="space-y-2">
                                                    <input type="number" value={totalInput[sub.name] || ''} onChange={e => setTotalInput({...totalInput, [sub.name]: e.target.value})} placeholder={`الإجمالي: ${sub.pages}`} className="w-full p-2 bg-slate-50 rounded-xl text-[10px] border focus:outline-none"/>
                                                    <button onClick={() => updateTotal(sub.name)} className="w-full py-2 bg-slate-800 text-white rounded-xl text-[10px] font-bold">تعديل الكل</button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'weekly' && (
                            <div className="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                                <div className="grid grid-cols-5 bg-slate-50 p-3 text-[10px] font-bold text-slate-500 border-b text-center">
                                    <div>اليوم</div><div>صباح</div><div>ظهر</div><div>عصر</div><div>مساء</div>
                                </div>
                                {['سبت','أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة'].map((d, i) => (
                                    <div key={i} className="grid grid-cols-5 p-3 text-[9px] border-b last:border-0 text-center items-center">
                                        <div className="font-bold text-slate-800">{d}</div>
                                        <div>علوم</div><div>رياضيات</div><div>كيمياء</div><div className="text-slate-300">{i===6?'راحة':'لغات'}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    
                    {/* Floating AI Footer */}
                    <footer className="fixed bottom-4 left-4 right-4 bg-white/80 backdrop-blur-md border border-white shadow-xl rounded-2xl p-3 flex justify-around items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-2 h-2 bg-indigo-600 rounded-full animate-pulse"></div>
                            <span className="text-[10px] font-bold text-slate-600">مدعوم بذكاء NotebookLM</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
